<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Khushi ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#6a11cb);
overflow:hidden;
color:#fff;
}

.page{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:340px;
padding:30px;
text-align:center;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.3);
}

h1{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
margin:15px 0;
font-size:18px;
text-align:center;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:white;
color:#ff0066;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#home{
display:none;
}

.big{
font-size:55px;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}
  .balloon{
position:fixed;
bottom:-120px;
width:45px;
height:60px;
border-radius:50%;
animation:fly linear infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:60px;
background:#fff;
left:50%;
top:60px;
}

@keyframes fly{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

.heart{
position:fixed;
top:-30px;
font-size:24px;
animation:fall 6s linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-30px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

#yesBtn,#noBtn{
margin:12px;
}

</style>
</head>

<body>

<div class="page" id="login">

<div class="card">

<h1>🔐 Secret Birthday Surprise</h1>

<p>Enter Password</p>

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Unlock ❤️</button>

<p id="msg" style="margin-top:15px;color:yellow;"></p>

</div>

</div>

<div class="page" id="home">

<div class="card">

<div class="big">🎂</div>

<h1>Happy Birthday Khushi ❤️</h1>

<h3>Wishing You Endless Happiness ✨</h3>

<p id="typing"></p>

<button id="yesBtn" onclick="yesClick()">Yes ❤️</button>

<button id="noBtn" onmouseover="moveNo()">No 😜</button>

</div>

</div>

<script>

const PASSWORD="2516";

function login(){

if(document.getElementById("pass").value===PASSWORD){

document.getElementById("login").style.display="none";
document.getElementById("home").style.display="flex";

typing();

createBalloons();

createHearts();

}else{

document.getElementById("msg").innerHTML="❌ Wrong Password";

}

}
  function typing(){

const text="💖 Dear Khushi,\n\nHappy Birthday! 🎂\nMay your life always be filled with happiness, success, good health and endless smiles. Stay blessed and keep shining forever! ❤️";

let i=0;

const box=document.getElementById("typing");

const timer=setInterval(()=>{

box.innerHTML+=text.charAt(i);

i++;

if(i>=text.length){

clearInterval(timer);

}

},40);

}

function createBalloons(){

const colors=["#ff4d6d","#00d4ff","#ffd93d","#7dff7d","#ff66ff","#ffffff"];

for(let i=0;i<15;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.background=colors[Math.floor(Math.random()*colors.length)];

b.style.left=Math.random()*100+"vw";

b.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(b);

}

}
  function createHearts(){

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

const hearts=["❤️","💖","💕","💗"];

h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},6000);

},250);

}

function moveNo(){

const btn=document.getElementById("noBtn");

btn.style.position="fixed";

btn.style.left=Math.random()*(window.innerWidth-120)+"px";

btn.style.top=Math.random()*(window.innerHeight-80)+"px";

}

function yesClick(){

alert("🎉 Happy Birthday Once Again Khushi! ❤️🥳");

showFireworks();

}
  function showFireworks(){

for(let i=0;i<80;i++){

let f=document.createElement("div");

f.innerHTML=["✨","🎆","🎇","💖"][Math.floor(Math.random()*4)];

f.style.position="fixed";
f.style.left="50%";
f.style.top="50%";
f.style.fontSize=(18+Math.random()*20)+"px";
f.style.pointerEvents="none";
f.style.transition="all 1.2s ease-out";

document.body.appendChild(f);

let angle=Math.random()*360;
let distance=80+Math.random()*220;

setTimeout(()=>{

f.style.transform=`translate(${Math.cos(angle*Math.PI/180)*distance}px,${Math.sin(angle*Math.PI/180)*distance}px)`;

f.style.opacity="0";

},20);

setTimeout(()=>{

f.remove();

},1300);

}

showConfetti();

}

function showConfetti(){

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.innerHTML=["🎉","🎊","✨","💖"][Math.floor(Math.random()*4)];

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-30px";
c.style.fontSize=(15+Math.random()*15)+"px";
c.style.pointerEvents="none";

document.body.appendChild(c);

let y=-30;
let speed=3+Math.random()*3;

let fall=setInterval(()=>{

y+=speed;

c.style.top=y+"px";

if(y>window.innerHeight){

clearInterval(fall);

c.remove();

}

},20);

}

}
  function showGift(){

const gift=document.createElement("div");

gift.innerHTML="🎁";

gift.style.position="fixed";
gift.style.left="50%";
gift.style.top="82%";
gift.style.transform="translate(-50%,-50%)";
gift.style.fontSize="70px";
gift.style.cursor="pointer";
gift.style.zIndex="9999";

document.body.appendChild(gift);

gift.onclick=function(){

gift.innerHTML="💝";

setTimeout(()=>{

alert("🎂 Happy Birthday Khushi ❤️\n\nMay all your dreams come true!\nStay Happy, Keep Smiling & Enjoy Your Special Day! 🥳✨");

gift.remove();

},500);

};

}

setTimeout(showGift,4000);

</script>

</body>
</html>
