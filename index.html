<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Khushi ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4e8a,#8e44ad);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.box{
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 0 25px rgba(0,0,0,.3);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
margin:15px 0;
font-size:18px;
text-align:center;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#fff;
color:#ff0066;
font-weight:bold;
}

button:hover{
background:#ffe4ec;
}

#birthday{
display:none;
text-align:center;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.big{
font-size:45px;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}
  #yesBtn,#noBtn{
margin:15px;
}

</style>
</head>

<body>

<div class="box" id="login">

<h1>🔐 Secret Surprise</h1>

<input type="password" id="pass" placeholder="Enter Password">

<button onclick="check()">Open Gift 🎁</button>

<p id="msg" style="margin-top:15px;color:yellow;"></p>

</div>

<div id="birthday">

<div class="big">🎂</div>

<h1>Happy Birthday Khushi ❤️</h1>

<h2>May all your dreams come true ✨</h2>

<p style="margin-top:15px;font-size:20px;">
Wishing you lots of happiness, success and smiles 💖
</p>

<br>

<button id="yesBtn" onclick="yes()">Yes ❤️</button>

<button id="noBtn" onmouseover="move()">No 😜</button>

</div>

<script>

function check(){

let p=document.getElementById("pass").value;

if(p=="2516"){

document.getElementById("login").style.display="none";

document.getElementById("birthday").style.display="block";

}else{

document.getElementById("msg").innerHTML="❌ Wrong Password";

}

}function yes(){
alert("💖 Thank You Khushi! Once Again Happy Birthday! 🎂❤️");
}

function move(){

let btn=document.getElementById("noBtn");

btn.style.position="absolute";

btn.style.left=Math.random()*(window.innerWidth-120)+"px";

btn.style.top=Math.random()*(window.innerHeight-80)+"px";

}

setInterval(()=>{

let e=document.createElement("div");

e.innerHTML="🎉";

e.style.position="fixed";

e.style.left=Math.random()*100+"vw";

e.style.top="-20px";

e.style.fontSize="30px";

e.style.animation="fall 4s linear";

document.body.appendChild(e);

setTimeout(()=>e.remove(),4000);

},250);

</script>

<style>

@keyframes fall{

0%{
transform:translateY(-20px);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</body>
</html>
