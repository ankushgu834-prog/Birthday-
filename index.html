<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4d6d,#6a11cb);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:340px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.3);
}

input{
width:100%;
padding:12px;
margin-top:20px;
border:none;
outline:none;
border-radius:10px;
font-size:18px;
text-align:center;
}

button{
margin-top:20px;
padding:12px 28px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:#fff;
color:#ff0066;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#home{
display:none;
}

.big{
font-size:60px;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

.balloon{
position:fixed;
bottom:-120px;
width:45px;
height:60px;
border-radius:50%;
animation:fly linear infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:60px;
background:white;
left:50%;
top:60px;
}

@keyframes fly{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}.heart{
position:fixed;
top:-30px;
font-size:24px;
animation:fall 6s linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-30px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

#yesBtn,#noBtn{
margin:12px;
}

</style>

<div class="container" id="login">

<div class="card">

<h1>🔐 Secret Surprise</h1>

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Unlock ❤️</button>

<p id="msg" style="color:yellow;margin-top:15px;"></p>

</div>

</div>

<div class="container" id="home">
